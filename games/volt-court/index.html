<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volt Court | Game Arcade</title>
  <link rel="stylesheet" href="../../css/game-base.css">
  <link rel="stylesheet" href="../../css/feedback.css?v=brand-feedback-1">
  <link rel="stylesheet" href="volt-court.css">
</head>
<body>
  <main class="game-shell volt-court-shell">
    <header class="game-header">
      <a class="back-link" href="../../index.html">← Arcade</a>
      <div class="title-block"><h1>⚡ Volt Court</h1><p>Pong evolved with neon trails, powerups, AI, and a 7-point set.</p></div>
      <div class="game-actions"><button id="pauseBtn" class="game-btn">Pause</button><button id="restartBtn" class="game-btn">Restart</button><button id="muteBtn" class="game-btn">Sound</button></div>
    </header>
    <section class="play-wrap">
      <div class="canvas-panel">
        <canvas id="gameCanvas" width="800" height="600" tabindex="0" aria-label="Volt Court game canvas"></canvas>
        <div id="message" class="message"></div>
        <div class="touch-controls" aria-label="Touch controls">
          <div class="dpad"><span class="blank"></span><button class="touch-btn" data-action="up">▲</button><span class="blank"></span><button class="touch-btn" data-action="left">◀</button><button class="touch-btn" data-action="down">●</button><button class="touch-btn" data-action="right">▶</button></div>
          <p class="small-note">Keyboard, mouse, touch, and virtual controls are supported.</p>
          <div class="action-stack"><button class="touch-btn" data-action="action">Action</button><button class="touch-btn" data-action="secondary">Alt</button></div>
        </div>
      </div>
      <aside class="side-panel">
        <div id="hud" class="hud"></div>
        <div id="leaderboard" class="leaderboard"></div>
        <div class="help-panel"><h2>How to Play</h2><ul><li><strong>Goal:</strong> Score 7 points before the AI.</li><li><strong>Win reward:</strong> Volt Court Trophy.</li><li>Use keyboard, mouse, or touch controls shown on screen.</li></ul></div>
      </aside>
    </section>
  </main>
  <script src="../../js/storage.js"></script>
  <script src="../../js/audio-engine.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/input-manager.js"></script>
  <script src="../../js/game-core.js"></script>
  <script src="volt-court.js"></script>
  <script src="../../js/feedback.js?v=brand-feedback-1"></script>
</body>
</html>
